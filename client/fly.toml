app = 'cammap-frontend'
primary_region = 'cdg'

[build]
  [build.args]
    VITE_API_URL = "https://cammap-backend.fly.dev/api"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
