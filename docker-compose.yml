version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cammap-postgres
    environment:
      POSTGRES_DB: cammap_fdf
      POSTGRES_USER: cammap_user
      POSTGRES_PASSWORD: cammap_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cammap-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cammap-backend
    environment:
      DATABASE_URL: postgresql://cammap_user:cammap_password@postgres:5432/cammap_fdf?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - cammap-network
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cammap-frontend
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cammap-network
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  cammap-network:
    driver: bridge