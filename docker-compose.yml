version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cammap-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cammap_fdf}
      POSTGRES_USER: ${POSTGRES_USER:-cammap_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cammap-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cammap-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cammap_user}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-cammap_fdf}?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - cammap-network
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cammap-frontend
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cammap-network
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  cammap-network:
    driver: bridge